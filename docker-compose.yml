services:
  app:
    build: .
    image: srev-app:latest
    container_name: srev-app
    restart: unless-stopped
    networks:
      - edge
      - internal
    volumes:
      - srev-data:/app/protocols
    expose:
      - "8501"
    environment:
      - STATS_ENGINE_URL=http://stats-engine:8000
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql://srev:${POSTGRES_PASSWORD:-srev}@db:5432/srev
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: srev-db
    restart: unless-stopped
    networks:
      - internal
    environment:
      - POSTGRES_DB=srev
      - POSTGRES_USER=srev
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-srev}
    volumes:
      - db-data:/var/lib/postgresql/data

  stats-engine:
    build: ./stats_engine
    image: srev-stats:latest
    container_name: srev-stats
    restart: unless-stopped
    networks:
      - internal
    expose:
      - "8000"

networks:
  edge:
    external: true
  internal: {}

volumes:
  srev-data:
  db-data:
